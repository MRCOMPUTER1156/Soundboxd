<!DOCTYPE html>
<html>
<head>
    <title>Álbumes - Soundboxd</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: #1c1c1c;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 8px;
        }

        .card h3 {
            margin: 10px 0 5px 0;
        }

        .card p {
            color: #aaa;
            font-size: 14px;
        }

        a {
            color: #1db954;
            text-decoration: none;
        }
    </style>
</head>
<body>

<h1>Álbumes</h1>
<p>Debug: Cantidad de álbumes recibidos: {{ albums|length }}</p>

<div class="grid">
    {% for album in albums %}
        <div class="card">
            {% if album.cover_url %}
                <img src="{{ album.cover_url }}" alt="{{ album.title }}">
            {% endif %}
            <h3>{{ album.title }}</h3>
            <p>{{ album.artist.name }} ({{ album.release_year }})</p>
        </div>
    {% empty %}
        <p>No hay álbumes todavía.</p>
    {% endfor %}
</div>

</body>
</html>
