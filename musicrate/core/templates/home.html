<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundboxd</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>

    <div class="topbar">
        <div class="brand"><span class="logo">▶</span> Soundboxd</div>
        <form action="{% url 'search' %}" method="get" class="search-form">
            <input type="text" name="q" class="search-input" placeholder="Buscar videos en YouTube" required>
            <button type="submit" class="search-button">Buscar</button>
        </form>
        <div class="auth-links">
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme"><span class="knob"></span></button>
            {% if user.is_authenticated %}
                <form method="post" action="{% url 'logout' %}" style="margin:0; display:inline">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">Cerrar sesión</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="auth-link">Iniciar sesión</a>
                <a href="{% url 'signup' %}" class="auth-link">Crear cuenta</a>
            {% endif %}
        </div>
    </div>

    <div class="main-content">
        <h1>Descubrí videos y creadores</h1>
        <p>Busca videos en YouTube y ordénalos por popularidad.</p>
    </div>

    <script src="{% static 'js/theme.js' %}"></script>
</body>
</html>
